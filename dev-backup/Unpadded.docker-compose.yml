services:
  base:
    build: .
    volumes:
      - .:/code
    working_dir: /code
    tty: true
  check:
    extends: base
    command: bash --login -c '
      cmake -B build -DCMAKE_CXX_COMPILER=g++-15 -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-Werror -Wall -Wextra -std=c++23 -fmax-errors=20 -ftemplate-backtrace-limit=0 -ftemplate-depth=100 -fconcepts-diagnostics-depth=10 -O0"
      && cmake --build build -t check -j8'
  iwyu:
    extends: base
    command: bash --login -c '
      cmake -B build &&
      cmake --build build -t iwyu -j8'
  format:
    extends: base
    command: sh -c '
      clang-format -i $(git ls-files | grep -E "\.(hpp|cpp)$");
      pipx run cmake-format -i $(git ls-files | grep -E "(CMakeLists.txt|\.cmake)$");'
  clangd:
    extends: base
    ports:
      - "50000:50000"
    command: socat tcp-listen:50000,reuseaddr exec:'clangd --path-mappings="$PWD=/code/"'
  doc:
    extends: base
    command: bash --login -c '
      cmake -B build &&
      cmake --build build -t doc'
  shell:
    extends: base
    command: bash
